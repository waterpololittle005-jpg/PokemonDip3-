<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeMarket Global | Engine v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-shadow { box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .jp-gradient { background: linear-gradient(135deg, #ff4b2b, #ff416c); }
        .en-gradient { background: linear-gradient(135deg, #1e3c72, #2a5298); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen">

    <header class="border-b border-slate-800 bg-[#1e293b] p-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-3xl font-black text-yellow-400 tracking-tighter">POKEMARKET <span class="text-white text-xs font-light tracking-widest uppercase ml-2">Global TCG Hub</span></h1>
            
            <div class="flex w-full md:w-auto bg-slate-900 rounded-full border border-slate-700 p-1">
                <input type="text" id="searchBox" placeholder="Search any Pokemon (e.g. Rayquaza)..." 
                       class="bg-transparent px-6 py-2 w-full md:w-80 outline-none text-sm">
                <button onclick="executeSearch()" class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold px-8 py-2 rounded-full transition-all">
                    SEARCH
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8">
        <div id="loading-state" class="hidden text-center py-20">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-yellow-500 border-t-transparent rounded-full mb-4"></div>
            <p class="text-slate-400 italic">Accessing International Databases...</p>
        </div>

        <div id="results-area">
            <h2 id="result-count" class="text-xl font-bold mb-8 text-slate-400">Search for a Pokemon to see English & Japanese listings.</h2>
            <div id="display-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-8">
                </div>
        </div>
    </main>

    <script>
        async function executeSearch() {
            const query = document.getElementById('searchBox').value;
            const grid = document.getElementById('display-grid');
            const loader = document.getElementById('loading-state');
            const countText = document.getElementById('result-count');

            if (!query) return alert("Please enter a name!");

            // UI Reset
            grid.innerHTML = "";
            loader.classList.remove('hidden');
            countText.innerText = `Searching for "${query}"...`;

            try {
                // Fetch English and Japanese Data simultaneously
                const [enRes, jpRes] = await Promise.all([
                    fetch(`https://api.tcgdex.net/v2/en/cards?name=${query}`),
                    fetch(`https://api.tcgdex.net/v2/jp/cards?name=${query}`)
                ]);

                const enData = await enRes.json();
                const jpData = await jpRes.json();

                loader.classList.add('hidden');
                
                const allItems = [
                    ...enData.slice(0, 10).map(c => ({...c, region: 'English', color: 'en-gradient'})),
                    ...jpData.slice(0, 10).map(c => ({...c, region: 'Japanese', color: 'jp-gradient'}))
                ];

                if (allItems.length === 0) {
                    countText.innerText = "No products found. Check spelling!";
                    return;
                }

                countText.innerText = `Found ${allItems.length} global products for "${query}"`;

                allItems.forEach(card => {
                    const cardHTML = `
                        <div class="bg-[#1e293b] rounded-2xl overflow-hidden card-shadow border border-slate-700 hover:border-yellow-500 transition-all group">
                            <div class="relative aspect-[3/4] overflow-hidden bg-slate-800">
                                <img src="${card.image}/low.webp" class="w-full h-full object-contain group-hover:scale-110 transition-transform duration-300" 
                                     onerror="this.src='https://via.placeholder.com/300x420?text=No+Image+Found'">
                                <div class="absolute top-3 left-3 ${card.color} text-[10px] font-black px-3 py-1 rounded-full shadow-lg">
                                    ${card.region}
                                </div>
                            </div>
                            <div class="p-5">
                                <h3 class="font-bold text-sm leading-tight h-10 overflow-hidden line-clamp-2">${card.name}</h3>
                                <p class="text-[10px] text-slate-500 mt-1 uppercase tracking-tighter">${card.id}</p>
                                <div class="mt-4 flex justify-between items-center">
                                    <div class="flex flex-col">
                                        <span class="text-[9px] text-slate-500 uppercase">Market Price</span>
                                        <span class="text-green-400 font-mono font-bold">$ --.--</span>
                                    </div>
                                    <button class="bg-slate-700 hover:bg-white hover:text-black text-[10px] font-bold px-3 py-2 rounded-lg transition-colors">
                                        VIEW DATA
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += cardHTML;
                });

            } catch (err) {
                loader.classList.add('hidden');
                countText.innerText = "Error connecting to the Poke-Servers. Try again.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
