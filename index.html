<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PokeMarket Global | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

    <nav class="p-6 border-b border-gray-800 flex justify-between items-center">
        <h1 class="text-2xl font-black text-yellow-400">POKEMARKET</h1>
        <div class="flex gap-2">
            <input type="text" id="userInput" placeholder="Search cards/boxes..." 
                   class="bg-gray-800 border border-gray-600 px-4 py-2 rounded-lg text-sm focus:outline-none focus:border-yellow-400">
            <button onclick="runSearch()" class="bg-yellow-500 text-black px-6 py-2 rounded-lg font-bold hover:bg-yellow-400">
                SEARCH
            </button>
        </div>
    </nav>

    <div id="card-grid" class="p-10 grid grid-cols-2 md:grid-cols-5 gap-6">
        <p class="col-span-full text-gray-500 text-center">Enter a name and hit search to pull from ENG/JPN markets.</p>
    </div>

    <script src="api-market-engine.js"></script>

    <script>
        // This function links the button to the API engine
        async function runSearch() {
            const query = document.getElementById('userInput').value;
            if(!query) return alert("Type something first!");

            // Call the function from your api-market-engine.js file
            const results = await searchGlobalMarket(query);

            if(results) {
                const grid = document.getElementById('card-grid');
                grid.innerHTML = ""; // Clear old results

                // Display English results
                results.cards.english.forEach(card => {
                    grid.innerHTML += `
                        <div class="bg-gray-800 p-2 rounded border border-gray-700">
                            <img src="${card.image}/low.webp" class="w-full">
                            <p class="text-[10px] mt-2 text-blue-400">ENGLISH</p>
                            <h4 class="text-xs font-bold">${card.name}</h4>
                        </div>
                    `;
                });
            }
        }
    </script>
</body>
</html>
