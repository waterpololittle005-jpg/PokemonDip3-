<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeNexus | Global Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .nexus-blue { color: #2563eb; }
        .card-hover:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body>

    <nav class="bg-white border-b border-slate-200 py-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="text-2xl font-black tracking-tighter nexus-blue">POKENEXUS</div>
        <div class="text-xs font-bold text-slate-400 uppercase tracking-widest">Global Network v1.0</div>
    </nav>

    <header class="max-w-4xl mx-auto text-center py-16 px-6">
        <h1 class="text-5xl font-black text-slate-900 mb-4 tracking-tight">The <span class="nexus-blue">Pokemon</span> Network.</h1>
        <p class="text-slate-500 mb-10">Search English and Japanese markets simultaneously.</p>

        <div class="relative max-w-xl mx-auto shadow-xl rounded-2xl overflow-hidden border border-slate-200 bg-white">
            <input type="text" id="mainSearch" placeholder="Enter Pokemon Name..." class="w-full py-4 px-6 outline-none">
            <button onclick="startSearch()" class="absolute right-2 top-2 bottom-2 bg-blue-600 text-white px-6 rounded-xl font-bold hover:bg-blue-700">
                SEARCH
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-20">
        <div id="loader" class="hidden text-center py-10 font-bold text-blue-600 animate-pulse">CONNECTING TO SATELLITE...</div>
        <div id="results-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </main>

    <script>
        // THE BRAIN
        async function startSearch() {
            const input = document.getElementById('mainSearch').value;
            const grid = document.getElementById('results-grid');
            const loader = document.getElementById('loader');

            if (!input) return alert("Type a name!");

            // 1. Show loading, clear old cards
            loader.classList.remove('hidden');
            grid.innerHTML = "";

            try {
                // 2. Ask the Pokemon API for data
                const response = await fetch(`https://api.tcgdex.net/v2/en/cards?name=${input}`);
                const data = await response.json();

                loader.classList.add('hidden');

                if (data.length === 0) {
                    grid.innerHTML = "<p class='col-span-full text-center text-slate-400'>No cards found.</p>";
                    return;
                }

                // 3. Put cards on the screen
                data.slice(0, 12).forEach(card => {
                    grid.innerHTML += `
                        <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden card-hover shadow-sm p-4">
                            <img src="${card.image}/low.webp" class="w-full h-40 object-contain mb-4" onerror="this.src='https://via.placeholder.com/150'">
                            <h3 class="font-bold text-sm truncate">${card.name}</h3>
                            <p class="text-[10px] text-slate-400 mb-3">${card.id}</p>
                            <div class="flex justify-between items-center border-t pt-3 border-slate-100">
                                <span class="text-blue-600 font-bold text-xs">$ MARKET</span>
                                <button class="text-[9px] bg-slate-100 px-2 py-1 rounded font-bold uppercase">View</button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                loader.classList.add('hidden');
                alert("Connection Error. Try again!");
            }
        }
    </script>
</body>
</html>
