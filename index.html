<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeNexus | Global TCG Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .nexus-blue { color: #2563eb; }
        .bg-nexus { background-color: #f8fafc; }
        .card-hover:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-nexus text-slate-900">

    <nav class="bg-white border-b border-slate-200 py-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="text-2xl font-black tracking-tighter nexus-blue">POKENEXUS</div>
        <div class="hidden md:flex gap-6 text-sm font-medium text-slate-600">
            <a href="#" class="hover:text-blue-600">Market Price</a>
            <a href="#" class="hover:text-blue-600">Japanese Sets</a>
            <a href="#" class="hover:text-blue-600">Sealed Product</a>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto text-center py-16 px-6">
        <h1 class="text-5xl md:text-6xl font-black text-slate-900 mb-6 tracking-tight">
            The World's <span class="nexus-blue">Pokemon</span> Marketplace.
        </h1>
        <p class="text-lg text-slate-600 mb-10 leading-relaxed">
            Track every card from 1996 to 2026. Compare English and Japanese markets, 
            analyze sealed product trends, and find your next grail.
        </p>

        <div class="relative max-w-2xl mx-auto shadow-2xl rounded-2xl overflow-hidden border-4 border-white">
            <input type="text" id="mainSearch" placeholder="Search cards, sets, or booster boxes..." 
                   class="w-full py-5 px-8 text-lg outline-none pr-32">
            <button onclick="handleNexusSearch()" class="absolute right-2 top-2 bottom-2 bg-blue-600 text-white px-8 rounded-xl font-bold hover:bg-blue-700 transition-colors">
                SEARCH
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div id="loader" class="hidden text-center py-10">
            <div class="animate-spin h-8 w-8 border-4 border-blue-600 border-t-transparent rounded-full mx-auto"></div>
        </div>
        
        <div id="results-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            </div>
    </main>

    <script>
        const API_URL = "https://api.tcgdex.net/v2";

        async function handleNexusSearch() {
            const query = document.getElementById('mainSearch').value;
            const grid = document.getElementById('results-grid');
            const loader = document.getElementById('loader');

            if (!query) return;

            // Start UI
            grid.innerHTML = "";
            loader.classList.remove('hidden');

            try {
                // Fetch Global Data
                const [enRes, jpRes] = await Promise.all([
                    fetch(`${API_URL}/en/cards?name=${query}`),
                    fetch(`${API_URL}/jp/cards?name=${query}`)
                ]);

                const enData = await enRes.json();
                const jpData = await jpRes.json();

                loader.classList.add('hidden');

                // Combine results
                const results = [
                    ...enData.slice(0, 8).map(c => ({...c, lang: 'ENG'})),
                    ...jpData.slice(0, 8).map(c => ({...c, lang: 'JPN'}))
                ];

                if (results.length === 0) {
                    grid.innerHTML = `<p class="col-span-full text-center text-slate-400">No products found for "${query}".</p>`;
                    return;
                }

                results.forEach(item => {
                    grid.innerHTML += `
                        <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden card-hover shadow-sm hover:shadow-md">
                            <div class="relative bg-slate-50 p-4">
                                <img src="${item.image}/low.webp" class="w-full h-48 object-contain mx-auto" onerror="this.src='https://via.placeholder.com/200x280?text=No+Image'">
                                <span class="absolute top-2 left-2 ${item.lang === 'ENG' ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700'} text-[10px] font-bold px-2 py-0.5 rounded">
                                    ${item.lang}
                                </span>
                            </div>
                            <div class="p-4">
                                <h3 class="font-bold text-sm truncate text-slate-800">${item.name}</h3>
                                <p class="text-[10px] text-slate-400 font-medium uppercase mt-1">${item.id}</p>
                                <div class="mt-4 flex justify-between items-center pt-3 border-t border-slate-100">
                                    <span class="text-blue-600 font-bold text-sm">$ MARKET</span>
                                    <button class="text-[10px] bg-slate-100 hover:bg-blue-600 hover:text-white px-3 py-1.5 rounded-lg font-bold transition-all">DATA</button>
                                </div>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                loader.classList.add('hidden');
                alert("Nexus connection lost. Please try again.");
            }
        }
    </script>
</body>
</html>
